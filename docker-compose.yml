# Source: materials/mooc-manus/docker-compose.yml（去 UI/nginx，留后端四件套）
# capstone 编排：redis + postgres + sandbox + api，一条 `docker compose up` 拉起全栈。
# 命题：api 必须等 redis/postgres/sandbox 就绪后才启动，否则启动期连接报错（见 s3 的依赖声明）。
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: manus
      POSTGRES_PASSWORD: manus
      POSTGRES_DB: manus
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U manus"]
      interval: 5s
      timeout: 3s
      retries: 5

  # TODO stage 3: 仿照上面 redis / postgres，补两个服务（写成真正的 YAML 条目，不是注释）：
  #   ① 沙箱服务 —— 服务名 sandbox，build 指向 ./workspace，端口 8080，
  #      并配一段就绪探活（仿上面 redis 那段：curl http://localhost:8080/health）。
  #   ② API 服务 —— 服务名 api，build 指向当前目录（.），端口 8000，
  #      环境变量 REDIS_HOST=redis、LLM_API_KEY、DATABASE_URL=postgres://manus:manus@postgres:5432/manus，
  #      并声明它对 redis/postgres/sandbox 三者的「就绪依赖」（查 compose 文档：让一个服务等另一个 healthy 后才启动）
  #      —— 否则 api 启动期连数据库/缓存会因为对方还没起来而报错。
