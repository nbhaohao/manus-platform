# Source: materials/mooc-manus/docker-compose.yml（去 UI/nginx，留后端四件套）
# capstone 编排：redis + postgres + sandbox + api，一条 `docker compose up` 拉起全栈。
# 命题：api 必须等 redis/postgres/sandbox 就绪后才启动，否则启动期连接报错（见 s3 的依赖声明）。
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: manus
      POSTGRES_PASSWORD: manus
      POSTGRES_DB: manus
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U manus"]
      interval: 5s
      timeout: 3s
      retries: 5

  sandbox:
    build: ./workspace
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      REDIS_HOST: redis
      LLM_API_KEY: ${LLM_API_KEY}
      DATABASE_URL: postgres://manus:manus@postgres:5432/manus
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      sandbox:
        condition: service_healthy
